name: Llama 3.1 8B FP8 Benchmarking Tests

on:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekdays at 11:00 AM UTC = 03:00 AM PST / 04:00 AM PDT
    - cron: "0 11 * * 0-6"

concurrency:
  # A PR number if a pull request and otherwise the commit hash. This cancels
  # queued and in-progress runs for the same PR (presubmit) or commit
  # (postsubmit). The workflow name is prepended to avoid conflicts between
  # different workflows.
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  test_llama_large:
    if: ${{ github.repository_owner == 'nod-ai' || github.event_name != 'schedule' }}
    timeout-minutes: 240
    name: "Llama 8B FP8 Benchmarking Tests"
    strategy:
      matrix:
        version: [3.11]
      fail-fast: false
    runs-on: linux-mi300-1gpu-ossci-nod-ai
    defaults:
      run:
        shell: bash
    env:
      VENV_DIR: ${{ github.workspace }}/.venv
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get Current Date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"

      - name: "Setting up Python"
        id: setup_python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{matrix.version}}
      - name: Create Python venv
        run: |
           python -m venv ${VENV_DIR}
           source ${VENV_DIR}/bin/activate

      - name: Install pip deps
        run: bash scripts/setenv.sh --nightly

      - name: Run export and compile
        run: |
          bash scripts/export_and_compile.sh \
             --irpa /shark-dev/8b/fp8/attnf8/native_fp8_e4m3fnuz_llama3_8b.irpa \
             --dtype fp8 --bs-prefill 4 --bs-decode 4

      - name: Run IREE Benchmark Module
        run: |
          bash scripts/run_iree_benchmark.sh --bs-prefill 4 --bs-decode 4 \
             --parameters /shark-dev/8b/fp8/attnf8/native_fp8_e4m3fnuz_llama3_8b.irpa \
             --model llama-8B-FP8 | tee $(pwd)/output_artifacts/iree_benchmark.log

      - name: Run Offline serving :chat
        run: |
          cd shortfin
          bash ../scripts/run_offline_serving.sh \
             --irpa /shark-dev/8b/fp8/attnf8/native_fp8_e4m3fnuz_llama3_8b.irpa \
             --tokenizer_json /shark-dev/8b/instruct/tokenizer.json \
             --vmfb ../output_artifacts/output.vmfb \
             --model_config ../output_artifacts/config_attn.json \
             --mode chat | tee ../output_artifacts/offline_serving_chat.log

      - name: Run Offline serving :reasoning
        run: |
          cd shortfin
          bash ../scripts/run_offline_serving.sh \
             --irpa /shark-dev/8b/fp8/attnf8/native_fp8_e4m3fnuz_llama3_8b.irpa \
             --tokenizer_json /shark-dev/8b/instruct/tokenizer.json \
             --vmfb ../output_artifacts/output.vmfb \
             --model_config ../output_artifacts/config_attn.json \
             --mode reasoning | tee ../output_artifacts/offline_serving_reasoning.log

      - name: Run Offline serving :summary
        run: |
          cd shortfin
          bash ../scripts/run_offline_serving.sh \
             --irpa /shark-dev/8b/fp8/attnf8/native_fp8_e4m3fnuz_llama3_8b.irpa \
             --tokenizer_json /shark-dev/8b/instruct/tokenizer.json \
             --vmfb ../output_artifacts/output.vmfb \
             --model_config ../output_artifacts/config_attn.json \
             --mode summary | tee ../output_artifacts/offline_serving_summary.log

      - name: Run online serving
        run: |
          bash scripts/run_serving.sh \
             --irpa /shark-dev/8b/fp8/attnf8/native_fp8_e4m3fnuz_llama3_8b.irpa \
             --tokenizer_json /shark-dev/8b/instruct/tokenizer.json \
             --vmfb ../output_artifacts/output.vmfb \
             --model_config ../output_artifacts/config_attn.json \
             --port 8900 | tee ../output_artifacts/serving.log

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.SHARK_PLATFORM_GH_TOKEN }}
          publish_dir: ./out/llm/llama/benchmark
          destination_dir: ./llm/llama/benchmark
          keep_files: true

      - name: Upload llama executable files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: llama-files
          path: ${{ github.workspace }}/${{ steps.date.outputs.date }}
